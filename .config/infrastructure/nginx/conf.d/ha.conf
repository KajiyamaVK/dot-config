server {
    listen 80;
    server_name ha.kajiyama.com.br; # Seguindo seu padrão de domínio

    location / {
        # Se o container do HA estiver na mesma 'proxy-net', use o nome do serviço
        proxy_pass http://homeassistant:8123; 
        
        # Caso o HA esteja rodando em host mode ou fora dessa rede, use:
        # proxy_pass http://host.docker.internal:8123;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Configuração de WebSockets (Crucial para o Home Assistant)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}