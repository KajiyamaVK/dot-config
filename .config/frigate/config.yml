mqtt:
  enabled: false

model:
  path: /config/model_cache/yolov8n.onnx
  model_type: yolo-generic
  width: 640
  height: 640
  input_tensor: nchw
  input_pixel_format: rgb
  input_dtype: float
  labelmap:
    0: person

detectors:
  nvidia:
    type: onnx
    device: auto

# -----------------------------------------------------------
# STREAMS
# -----------------------------------------------------------
go2rtc:
  api:
    listen: ":1984"
  streams:
    # We use the URL that YOU CONFIRMED works (Option A)
    sala: 
      - "rtsp://192.168.0.21:554/user=admin_password=tlJwpbo6_channel=0_stream=0.sdp?real_stream&transport=tcp"
      - "ffmpeg:sala#audio=aac"
    
    # Sub-stream for detection (stream=1)
    sala_sub: 
      - "rtsp://192.168.0.21:554/user=admin_password=tlJwpbo6_channel=0_stream=1.sdp?real_stream&transport=tcp"   
cameras:
  # -------------------------------------------------------
  # SALA
  # -------------------------------------------------------
  sala:
    ffmpeg:
      inputs:
        # High Res Stream (Recording)
        - path: rtsp://127.0.0.1:8554/sala?video=copy
          input_args: preset-rtsp-restream
          roles:
            - record
        # Low Res Stream (Detection)
        - path: rtsp://127.0.0.1:8554/sala_sub?video=copy
          input_args: preset-rtsp-restream
          roles:
            - detect
    detect:
      width: 640  # Standard sub-stream width
      height: 360 # If the image looks stretched/squished, try 480
      fps: 5
      enabled: true

  # -------------------------------------------------------
  # OTHER CAMS (Commented Out)
  # -------------------------------------------------------
  # edicula:
  #   ffmpeg:
  #     inputs:
  #       - path: rtsp://127.0.0.1:8554/edicula?video=copy
  #         input_args: preset-rtsp-restream
  #         roles:
  #           - record
  #           - detect
  #   detect:
  #     width: 1920
  #     height: 1080
  #     fps: 5
  #     enabled: true

  # garagem:
  #   ffmpeg:
  #     inputs:
  #       - path: rtsp://127.0.0.1:8554/garagem?video=copy
  #         input_args: preset-rtsp-restream
  #         roles:
  #           - record
  #           - detect
  #   detect:
  #     width: 1920
  #     height: 1080
  #     fps: 5
  #     enabled: true

record:
  enabled: true
  retain:
    days: 3
    mode: motion

snapshots:
  enabled: true

detect:
  enabled: true
version: 0.16-0